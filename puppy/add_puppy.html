<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Puppy</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #4a90e2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background: #357abd; }
        nav { background: #4a90e2; color: white; padding: 15px; position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; }
        nav a { color: white; text-decoration: none; margin-right: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/logout">Logout</a>
    </nav>
    
    <div class="container" style="margin-top: 80px;">
        <h2>List a New Puppy</h2>
        <!-- enctype="multipart/form-data" is REQUIRED for file uploads -->
        <form method="POST" enctype="multipart/form-data">
            <label>Name</label>
            <input type="text" name="name" required>
            
            <label>Breed</label>
            <input type="text" name="breed" required>
            
            <label>Price (Rs)</label>
            <input type="number" step="0.01" name="price" required>
            
            <label>Description</label>
            <textarea name="description" rows="3"></textarea>
            
            <!-- New Image Input -->
            <label>Puppy Image</label>
            <input type="file" name="image" accept="image/*" required>
            
            <button type="submit" style="margin-top: 15px;">Add Puppy</button>
        </form>
    </div>
</body>
</html>
